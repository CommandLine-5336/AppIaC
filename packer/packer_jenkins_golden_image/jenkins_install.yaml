---
 - name: Install Jenkins
   hosts: all
   become: true
   tasks:
    - name: Change hostname in datadog
      ansible.builtin.lineinfile:
        path: /etc/datadog-agent/datadog.yaml
        regexp: '^hostname:'
        line: "hostname: Jenkins-{{ ansible_hostname }}"
    - name: Restart Datadog
      ansible.builtin.service:
        name: datadog-agent
        state: restarted
    - name: Show the extracted username
      ansible.builtin.set_fact:
       creds: "{{ lookup('amazon.aws.secretsmanager_secret', 'jenkins/admin-credentials', region='us-east-1') | from_json }}"
      no_log: true
    - name: Update apt
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
    - name: Install java
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
      loop:
        - fontconfig
        - openjdk-21-jre
    - name: Install Jenkins
      ansible.builtin.shell: |
        set -o pipefail
        sudo wget -O /etc/apt/keyrings/jenkins-keyring.asc \
        https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        echo "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc]" \
        https://pkg.jenkins.io/debian-stable binary/ | sudo tee \
        /etc/apt/sources.list.d/jenkins.list > /dev/null
        sudo apt update
        sudo apt install jenkins -y
    - name: Enable jenkins service
      ansible.builtin.service:
        name: jenkins
        enabled: yes
    - name: Bypass Jenkins initial setup
      ansible.builtin.lineinfile:
        path: /etc/default/jenkins
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        insertafter: EOF
        create: yes
        mode: '0644'
      loop:
        - regexp: '^JAVA_ARGS=.*'
          line: 'JAVA_ARGS="-Djenkins.install.runSetupWizard=false"'
        - regexp: '^JENKINS_JAVA_OPTIONS='
          line: 'JENKINS_JAVA_OPTIONS="-Djenkins.install.runSetupWizard=false"'
    - name: Create Jenkins directory for a new user
      ansible.builtin.file:
        path: /var/lib/jenkins/init.groovy.d
        state: directory
        owner: jenkins
        group: jenkins
        mode: '0755'
    - name: Create a User from groovy.j2 template
      ansible.builtin.template:
        src: ./basic-security.groovy.j2
        dest: /var/lib/jenkins/init.groovy.d/basic-security.groovy
        owner: jenkins
        group: jenkins
        mode: '0644'
    - name: Restart Jenkins
      ansible.builtin.service:
        name: jenkins
        state: restarted
    - name: Install ansible
      ansible.builtin.apt:
        name: ansible
        state: present
    - name: Install collections necessary for jenkins job execution
      ansible.builtin.shell: |
        ansible-galaxy collection install {{ item }}
      loop:
        - amazon.aws
        - ansible.mysql
