---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart gunicorn
  ansible.builtin.service:
    name: "{{ web_app_name }}"
    state: restarted

- name: Reload nginx
  ansible.builtin.service:
    name: nginx
    state: reloaded

- name: Reload consul
  ansible.builtin.service:
    name: consul
    state: reloaded
