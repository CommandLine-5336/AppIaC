---
- name: Create consul-template user
  ansible.builtin.user:
    name: consul-template
    system: yes

- name: Allow nginx reload via sudo
  ansible.builtin.copy:
    dest: /etc/sudoers.d/consul-template-nginx
    content: "{{ lb_user }} ALL=(root) NOPASSWD: /usr/bin/systemctl reload nginx\n"
    mode: '0440'

- name: Create consul-template config dir
  ansible.builtin.file:
    path: /etc/consul-template.d
    state: directory
    owner: "{{ lb_user }}"
    group: "{{ lb_group }}"
    mode: '0755'

- name: Copy nginx template file
  ansible.builtin.copy:
    src: nginx.conf.ctmpl
    dest: /etc/consul-template.d/nginx.conf.ctmpl
    owner: "{{ lb_user }}"
    group: "{{ lb_group }}"
    mode: '0640'
  notify: Restart consul-template

- name: Configure consul-template
  ansible.builtin.template:
    src: consul-template.hcl.j2
    dest: /etc/consul-template.d/config.hcl
    owner: "{{ lb_user }}"
    group: "{{ lb_group }}"
    mode: '0640'
  notify: Restart consul-template

- name: Make sites-available writable
  ansible.builtin.file:
    path: /etc/nginx/sites-available
    state: directory
    group: "{{ lb_group }}"
    mode: '0775'

- name: Install consul-template binary
  ansible.builtin.unarchive:
    src: "{{ lb_consul_template_url }}"
    dest: /usr/local/bin
    remote_src: yes
    mode: '0755'
  args:
    creates: /usr/local/bin/consul-template

- name: Deploy consul-template systemd unit
  ansible.builtin.template:
    src: consul-template.service.j2
    dest: /etc/systemd/system/consul-template.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart consul-template

- name: Start consul-template
  ansible.builtin.systemd:
    name: consul-template
    state: started
    enabled: yes
