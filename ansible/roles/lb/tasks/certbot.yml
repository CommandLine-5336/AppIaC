---
- name: Ensure Nginx is running
  ansible.builtin.service:
    name: nginx
    state: started

- name: Try to lookup fullchain secret in AWS
  ansible.builtin.set_fact:
    aws_fullchain: "{{ lookup('amazon.aws.aws_secret', 'birdwatching/ssl_certs/fullchain', region='us-east-1') }}"
  ignore_errors: yes
  register: fullchain_res
  failed_when: false

- name: Try to lookup privkey secret in AWS
  ansible.builtin.set_fact:
    aws_privkey: "{{ lookup('amazon.aws.aws_secret', 'birdwatching/ssl_certs/privkey', region=region) }}"
  ignore_errors: yes
  register: privkey_res
  failed_when: false

- name: Checking if directory exists
  ansible.builtin.file:
    path: "/etc/letsencrypt/live/birdwatching.com"
    state: directory
    mode: '0755'
  when: not fullchain_res.failed

- name: Write fullchain to local directory
  ansible.builtin.copy:
    content: "{{ aws_fullchain }}"
    dest: "/etc/letsencrypt/live/birdwatching.com/fullchain.pem"
    mode: '0644'
  when: not fullchain_res.failed

- name: Write privkey to local directory
  ansible.builtin.copy:
    content: "{{ aws_privkey }}"
    dest: "/etc/letsencrypt/live/birdwatching.com/privkey.pem"
    mode: '0600'
  when: not privkey_res.failed

- name: Check if certificate already exists
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/birdwatching.com/fullchain.pem"
  register: cert_file

- name: Request certificate using certbot nginx plugin
  ansible.builtin.command: >
    certbot certonly
    --nginx
    --non-interactive
    --agree-tos
    --email commandlline@gmail.com
    -d birdwatching.com
    -d www.birdwatching.com
  when: not cert_file.stat.exists and fullchain_res.failed and privkey_res.failed
  register: certbot_result
  changed_when: "'Successfully received certificate' in certbot_result.stdout"
  notify: Reload Nginx

- name: Retrieving fullchain
  ansible.builtin.slurp:
    src: /etc/letsencrypt/live/birdwatching.com/fullchain.pem
  when: certbot_result is changed
  register: fullchain

- name: Retrieving privkey
  ansible.builtin.slurp:
    src: /etc/letsencrypt/live/birdwatching.com/privkey.pem
  when: certbot_result is changed
  register: privkey

- name: Create fullchain secret
  community.aws.secretsmanager_secret:
    name: birdwatching/ssl_certs/fullchain
    description: "SSL certificate fullchain"
    secret: "{{ fullchain['content'] | b64decode }}"
    region: "us-east-1"
    state: present
    secret_type: "string"
    tags:
      Environment: dev
  when: certbot_result is changed

- name: Create privkey secret
  community.aws.secretsmanager_secret:
    name: birdwatching/ssl_certs/privkey
    description: "SSL certificate privkey"
    secret: "{{ privkey['content'] | b64decode }}"
    region: "us-east-1"
    state: present
    secret_type: "string"
    tags:
      Environment: dev
  when: certbot_result is changed

- name: Deploy Nginx SSL configuration
  ansible.builtin.template:
    src: templates/nginx-ssl-letsencrypt.conf.j2
    dest: /etc/nginx/sites-available/birdwatching.com.conf
    mode: '0644'
  notify: Reload Nginx

- name: Enable site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/birdwatching.com.conf
    dest: /etc/nginx/sites-enabled/birdwatching.com.conf
    state: link
  notify: Reload Nginx